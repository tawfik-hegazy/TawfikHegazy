<svg width="860" height="200" viewBox="0 0 860 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&amp;family=Sora:wght@400;700&amp;display=swap');

      .bg { fill: #0d1117; }
      .glow-circle { fill: none; }

      .name {
        font-family: 'Sora', 'Segoe UI', sans-serif;
        font-size: 38px;
        font-weight: 700;
        fill: #e6edf3;
        animation: fadeSlideIn 0.8s ease both;
      }
      .tagline {
        font-family: 'Space Mono', monospace;
        font-size: 13px;
        fill: #58a6ff;
        animation: fadeSlideIn 0.8s ease 0.2s both;
      }
      .sub {
        font-family: 'Sora', 'Segoe UI', sans-serif;
        font-size: 13px;
        fill: #7d8590;
        animation: fadeSlideIn 0.8s ease 0.4s both;
      }
      .mono {
        font-family: 'Space Mono', monospace;
        font-size: 12px;
      }
      .cursor {
        fill: #58a6ff;
        animation: blink 1s step-end infinite;
      }
      .type-text {
        font-family: 'Space Mono', monospace;
        font-size: 13px;
        fill: #e6edf3;
        animation: fadeSlideIn 0.6s ease 0.6s both;
      }
      .prompt { fill: #3fb950; }
      .divider { stroke: #21262d; stroke-width: 1; }
      .dot1 { fill: #f85149; }
      .dot2 { fill: #d29922; }
      .dot3 { fill: #3fb950; }

      /* badge text */
      .bdg { font-family: 'Space Mono', monospace; font-size: 10.5px; }

      /* orbit animation */
      .orbit-ring {
        fill: none;
        stroke: rgba(88,166,255,0.08);
        stroke-width: 1;
        animation: spinOrbit 18s linear infinite;
        transform-origin: 760px 100px;
      }
      .orbit-ring-2 {
        fill: none;
        stroke: rgba(63,185,80,0.07);
        stroke-width: 1;
        animation: spinOrbit2 26s linear infinite reverse;
        transform-origin: 760px 100px;
      }
      .orbit-dot {
        fill: #58a6ff;
        animation: spinOrbit 18s linear infinite;
        transform-origin: 760px 100px;
      }
      .orbit-dot-2 {
        fill: #3fb950;
        animation: spinOrbit2 26s linear infinite reverse;
        transform-origin: 760px 100px;
      }

      @keyframes spinOrbit {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }
      @keyframes spinOrbit2 {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }
      @keyframes fadeSlideIn {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0; }
      }
      @keyframes glowPulse {
        0%, 100% { opacity: 0.18; r: 55; }
        50%       { opacity: 0.32; r: 70; }
      }
      .glow-anim {
        fill: rgba(88,166,255,0.18);
        animation: glowPulse 4s ease-in-out infinite;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="860" height="200" rx="12" class="bg"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="50" x2="860" y2="50" class="divider"/>
  <line x1="0" y1="150" x2="860" y2="150" class="divider"/>
  <line x1="500" y1="0" x2="500" y2="200" class="divider"/>

  <!-- Right orbit system -->
  <ellipse cx="760" cy="100" rx="72" ry="72" class="orbit-ring"/>
  <ellipse cx="760" cy="100" rx="48" ry="48" class="orbit-ring-2"/>
  <circle cx="832" cy="100" r="4" class="orbit-dot"/>
  <circle cx="760" cy="52" r="3" class="orbit-dot-2"/>

  <!-- Glow blob -->
  <circle cx="760" cy="100" r="55" class="glow-anim"/>

  <!-- Center tech icon: angle brackets -->
  <text x="760" y="107" text-anchor="middle" font-family="'Space Mono', monospace" font-size="26" font-weight="700" fill="#58a6ff" opacity="0.9">&lt;/&gt;</text>

  <!-- Mac window dots -->
  <circle cx="32" cy="24" r="5" class="dot1"/>
  <circle cx="48" cy="24" r="5" class="dot2"/>
  <circle cx="64" cy="24" r="5" class="dot3"/>

  <!-- Main content left -->
  <text x="40" y="80" class="name">Tawfik Hegazy</text>
  <text x="40" y="103" class="tagline">CS Student · Full-Stack · Embedded · Aerospace</text>
  <text x="40" y="125" class="sub">Egyptian Chinese University (ECU) · Cairo, EG 🇪🇬</text>

  <!-- Terminal line -->
  <rect x="40" y="142" width="420" height="34" rx="6" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <text x="56" y="164" class="prompt mono">$ </text>
  <text x="70" y="164" class="type-text">always building · always learning · never stopping</text>
  <rect x="450" y="152" width="2" height="14" class="cursor"/>
</svg>
